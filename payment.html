<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment • BRNNO</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="flow.css">
</head>
<body>
  <header>
    <div class="container nav">
      <div class="brand">
        <span class="logo">
          <img src="BRNNO_logov3.jpg" alt="BRNNO Logo">
        </span>
      </div>
    </div>
  </header>

  <!-- Step indicator -->
  <section class="hero">
    <div class="container">
      <h1 class="headline">Payment Details</h1>
      <p class="sub">Secure checkout — encrypted and protected.</p>

        <div class="stepbar">
            <div class="step"><span class="dot">1</span>Location</div><div class="sep"></div>
            <div class="step"><span class="dot">2</span>Service</div><div class="sep"></div>
            <div class="step"><span class="dot">3</span>Detailers</div><div class="sep"></div>
            <div class="step"><span class="dot">4</span>Schedule</div><div class="sep"></div>
            <div class="step active"><span class="dot">5</span>Payment</div>
        </div>
    </div>
  </section>

  <!-- Payment Form -->
  <section class="payment-section">
    <div class="container">
      <div class="payment-card">
        <form action="confirmation.html" method="get" class="form-grid">
          <h2>Payment Method</h2>
          <div class="card-icons">
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/Visa_Logo.png" alt="Visa">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Mastercard-logo.png" alt="MasterCard">

          </div>

          <div>
            <label for="card-name">Name on Card</label>
            <input type="text" id="card-name" name="card-name" placeholder="John Doe" required>
          </div>

          <div>
            <label for="card-number">Card Number</label>
            <input type="text" id="card-number" name="card-number" placeholder="1234 5678 9012 3456" required>
          </div>

          <div class="inline-fields">
            <div>
              <label for="exp-date">Expiration Date</label>
              <input type="text" id="exp-date" name="exp-date" placeholder="MM/YY" required>
            </div>
            <div>
              <label for="cvv">CVV</label>
              <input type="text" id="cvv" name="cvv" placeholder="123" required>
            </div>
          </div>

          <div>
            <label for="zip">Billing ZIP Code</label>
            <input type="text" id="zip" name="zip" placeholder="90210" required>
          </div>

          <div class="actions">
            <a class="btn-outline" href="schedule.html">Back</a>
            <button class="btn-primary" type="submit">Confirm & Pay</button>
          </div>
        </form>
      </div>
    </div>
  </section>
</body>
</html>
